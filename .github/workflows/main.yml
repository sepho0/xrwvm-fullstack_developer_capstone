name: CI/CD

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python lint
        run: |
          pip install flake8
          flake8 server/djangoapp/*.py --max-line-length=79
      - name: JS lint
        run: |
          npm install -g jshint
          jshint server/frontend/src/components/Dealers/*.jsx
